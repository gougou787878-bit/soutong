<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Pragma" content="no-cache,no-store,must-revalidate" />
    <meta http-equiv="Cache-Control"
        content="Cache-Control: no-store, no-cache, max-age=0, must-revalidate, proxy-revalidate" />
    <meta http-equiv="Expires" content="0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/assets-zt/css/index.css">
</head>

<body>
    <div class="wrap-body" routerName="index.html" id="blur">
        <div class="main-content">
            <div class="header">
                <img src="/assets-zt/images/banner.png?v=1" alt="">
            </div>
            <div class="img-container">
                <div class="small-images">
                    <div class="nav def1 active">
                        鲜肉
                    </div>
                    <div class="nav def2">
                        学生
                    </div>
                    <div class="nav def3">
                        奶狗
                    </div>
                    <div class="nav def4">
                        18禁
                    </div>
                </div>

                <div id="big-image">
                    <div class="tips-container"><img src="/assets-zt/images/img-1.webp?v=2"></div>
                    <div class="tips-container"><img src="/assets-zt/images/img-2.webp?v=2"></div>
                    <div class="tips-container"><img src="/assets-zt/images/img-3.webp?v=2"></div>
                    <div class="tips-container"><img src="/assets-zt/images/img-4.webp?v=2"></div>
                </div>
            </div>

            <div class="footer-area btn_down">
                <div class="download">
                    <img src="/assets-zt/images/footer_banner.png?v=1" alt="footer_banner">
                </div>
                <div class="tips-container open-vip-btn">立即开通会员 解锁独家资源</div>
            </div>
        </div>
    </div>
    <div class="van-mask"></div>
    <div class="van-dialog" id="pay-dialog">
        <div class="van-dialog__title">温馨提示</div>
        <div class="van-dialog__message"></div>
        <div class="van-dialog__footer">
            <button class="van-button cancel">再想想</button>
            <button class="van-button confirm has-auth" data-close="1">去开通</button>
        </div>
    </div>
    <div class="van-dialog" id="payed-dialog">
        <div class="van-dialog__title">温馨提示</div>
        <div class="van-dialog__message"></div>
        <div class="van-dialog__footer">
            <button class="van-button confirm">确定</button>
        </div>
    </div>
    <div class="van-dialog loading-dialog">
        <img src="/assets-zt/images/loading.gif">
        <div class="loading-content">请求中...</div>
    </div>
    <script src="/assets-zt/js/jQuery.min.js"></script>
    <script src="/assets-zt/js/main.js"></script>
</body>

</html>
